name: Update EMAX M3U8 Playlist

on:
  schedule:
    # Runs every 6 hours. You can adjust this cron schedule as needed.
    - cron: '0 */6 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    # Required permissions for the bot to push the file back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Libraries
        run: |
          python -m pip install --upgrade pip
          # Installing httpx with HTTP/2 support to bypass Cloudflare blocks
          pip install httpx[http2] pycryptodome

      - name: Execute Decryption Script
        run: python main.py

      - name: Commit and Push emax.m3u8
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add the file to staging
          git add emax.m3u8
          
          # Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No changes detected in emax.m3u8. Skipping commit."
          else
            git commit -m "Automated update: emax.m3u8"
            git push
            echo "Successfully pushed the updated playlist."
          fi
          
