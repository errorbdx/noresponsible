name: Update EMAX M3U8 Playlist

on:
  schedule:
    # Runs every 6 hours. You can adjust this to run more or less frequently.
    - cron: '0 */0 * * *'
  # Allows you to trigger the script manually from the Actions tab
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    # Required permissions for the bot to push the updated file back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Libraries
        run: |
          python -m pip install --upgrade pip
          # Using curl-cffi to spoof the TLS fingerprint and bypass the redirect
          pip install curl-cffi pycryptodome

      - name: Execute Decryption Script
        run: python main.py

      - name: Commit and Push emax.m3u8
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if the file was successfully created by the Python script
          if [ -f emax.m3u8 ]; then
            git add emax.m3u8
            # Only commit if there are actual changes to the file content
            if git diff --staged --quiet; then
              echo "No changes detected in emax.m3u8. Skipping commit."
            else
              git commit -m "Automated update: emax.m3u8"
              git push
              echo "Successfully pushed the updated playlist."
            fi
          else
            echo "emax.m3u8 was not generated. The Python script failed to fetch or decrypt the payload."
            exit 1
          fi
          
