name: Update EMAX M3U8 Playlist

on:
  # This schedule runs the script every 6 hours. 
  # You can change the cron timing to suit your needs.
  schedule:
    - cron: '0 */6 * * *' 
  # This allows you to run the action manually from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    
    # Required permissions to push code back to the repository
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome

      - name: Execute Decryption Script
        run: python main.py

      - name: Commit and Push M3U8 File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emax.m3u8
          
          # This command checks if there are any changes to the file.
          # It will only commit and push if the m3u8 file has actually been updated.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: emax.m3u8" && git push)
          
